services:
  # Test PostgreSQL Database
  postgres-test:
    image: postgres:15-alpine
    container_name: test-postgres
    restart: unless-stopped
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test Redis for queues and caching
  redis-test:
    image: redis:7-alpine
    container_name: test-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6380}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Test Elasticsearch for search
  elasticsearch-test:
    image: elasticsearch:9.0.3
    container_name: test-elasticsearch
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ELASTICSEARCH_PORT:-9201}:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx256m"  # Reduced resources for CI
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=60s || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # MailHog for email testing
  mailhog-test:
    image: mailhog/mailhog:latest
    container_name: test-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025"]
      interval: 10s
      timeout: 5s
      retries: 3